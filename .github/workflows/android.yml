name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java Development Kit (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Hard-Locked Dependencies
      run: npm install

    - name: Clear Android Asset Cache
      run: |
        npx cap copy android
        npx cap sync android

    - name: Build App with Gradle Cloud Compiler
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK File
      uses: actions/upload-artifact@v4
      with:
        name: NetworkTrafficMonitor-App
        path: android/app/build/outputs/apk/debug/app-debug.apk