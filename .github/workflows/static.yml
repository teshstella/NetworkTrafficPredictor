name: Deploy Frontend to Pages

on:
  push:
    branches: ["main"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup Pages Configuration
        uses: actions/configure-pages@v5
        
      - name: Upload Frontend Folder Assets
        uses: actions/upload-pages-artifact@v3
        with:
          # This directly uploads just your frontend folder contents to the root of your web app
          path: './Frontend'
          
      - name: Deploy Live to GitHub Cloud
        id: deployment
        uses: actions/deploy-pages@v4