<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Traffic Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }
        .dashboard {
            width: 90%;
            max-width: 700px;
            margin: 40px auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #38bdf8;
            font-size: 2rem;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.4);
        }
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #e2e8f0;
            font-size: 1.4rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }
        .metric {
            background: #334155;
            padding: 15px;
            margin: 12px 0;
            border-radius: 10px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .metric span {
            font-weight: bold;
            color: #38bdf8;
        }
        .chart-container {
            margin-top: 25px;
            background: #ffffff;
            border-radius: 10px;
            padding: 15px;
            position: relative;
            height: 300px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-container {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        #analyzeBtn { background: #2563eb; color: white; }
        #analyzeBtn:hover { background: #1d4ed8; }
        #logoutBtn { background: #ef4444; color: white; }
        #logoutBtn:hover { background: #dc2626; }
        .status-high { color: #f87171 !important; }
        .status-stable { color: #4ade80 !important; }
    </style>
</head>
<body>
<div class="dashboard">
    <h1> Network Traffic Dashboard</h1>
    <div class="card">
        <h2>Live Network Analysis</h2>
        <div class="metric">
            <span>Download Speed:</span>
            <span><span id="download">0</span> Mbps</span>
        </div>
        <div class="metric">
            <span>Upload Speed:</span>
            <span><span id="upload">0</span> Mbps</span>
        </div>
        <div class="metric">
            <span>Latency:</span>
            <span><span id="latency">0</span> ms</span>
        </div>
        <div class="metric">
            <span>Traffic Status:</span>
            <span id="status">Unknown</span>
        </div>
        <div class="metric">
            <span>Recommendation:</span>
            <span id="recommendation">None</span>
        </div>
        <div class="chart-container">
            <canvas id="trafficChart"></canvas>
        </div>
        <div class="btn-container">
            <button id="analyzeBtn">Analyze Network</button>
            <button id="logoutBtn">Logout</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="dashboard.js"></script>
</body>
</html>
